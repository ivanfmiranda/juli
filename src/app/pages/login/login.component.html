<section class="login-page">
  <div class="login-card">
    <h1>{{ brandName }}</h1>
    <p>{{ 'login.subtitle' | juliTranslate }}</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        {{ 'login.username' | juliTranslate }}
        <input type="text" formControlName="username" autocomplete="off">
        <span class="field-error" *ngIf="form.get('username')?.touched && form.get('username')?.hasError('required')">
          {{ 'login.usernameRequired' | juliTranslate }}
        </span>
      </label>

      <label>
        {{ 'login.password' | juliTranslate }}
        <input type="password" formControlName="password" autocomplete="new-password">
        <span class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')">
          {{ 'login.passwordRequired' | juliTranslate }}
        </span>
      </label>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="warning" *ngIf="warningMessage">{{ warningMessage }}</p>

      <button type="submit" [disabled]="submitting">
        {{ submitting ? ('login.signingIn' | juliTranslate) : ('login.signIn' | juliTranslate) }}
      </button>

      <p class="forgot-link">
        <a routerLink="/recuperar-senha">{{ 'login.forgotLink' | juliTranslate }}</a>
      </p>
    </form>

    <p class="register-link">
      {{ 'login.noAccount' | juliTranslate }} <a routerLink="/register">{{ 'login.createAccount' | juliTranslate }}</a>
    </p>
  </div>
</section>
