<article class="product-card" [class.layout-list]="layout === 'list'">
  <a [routerLink]="product.url" class="card-link">
    <!-- Image -->
    <div class="card-image">
      <img 
        *ngIf="product.mainImage?.url" 
        [src]="product.mainImage!.url" 
        [alt]="product.mainImage?.altText || product.name"
        loading="lazy">
      
      <div class="image-placeholder" *ngIf="!product.mainImage?.url">
        <app-icon name="package" [size]="40"></app-icon>
      </div>

      <!-- Hover Image -->
      <img 
        *ngIf="product.additionalImages?.[0]?.url"
        [src]="product.additionalImages![0].url" 
        class="hover-image"
        loading="lazy"
        [alt]="product.name">

      <!-- Badges -->
      <div class="card-badges">
        <span 
          *ngIf="getClassificationBadge() as badge"
          class="badge"
          [class]="badge.class">
          {{ badge.text }}
        </span>
      </div>

      <!-- Quick Add -->
      <button
        *ngIf="showQuickAdd && product.available"
        class="btn-quick-add"
        (click)="onAddToCart($event)"
        [title]="product.stock.status === 'OUT_OF_STOCK' ? ('productCard.quickAddUnavailable' | juliTranslate) : ('productCard.quickAddToCart' | juliTranslate)">
        <app-icon *ngIf="product.stock.status !== 'OUT_OF_STOCK'" name="shopping-cart" [size]="18"></app-icon>
        <app-icon *ngIf="product.stock.status === 'OUT_OF_STOCK'" name="x" [size]="18"></app-icon>
      </button>

      <!-- Wishlist Toggle -->
      <button
        class="btn-wishlist"
        [class.saved]="isSaved$ | async"
        (click)="onToggleWishlist($event)"
        [title]="(isSaved$ | async) ? ('wishlist.remove' | juliTranslate) : ('wishlist.add' | juliTranslate)">
        <app-icon name="heart" [size]="18" [filled]="!!(isSaved$ | async)"></app-icon>
      </button>
    </div>

    <!-- Info -->
    <div class="card-info">
      <!-- Rating -->
      <div class="product-rating" *ngIf="product.rating">
        <div class="stars">
          <app-icon *ngFor="let star of [1,2,3,4,5]"
                    name="star"
                    [size]="14"
                    [filled]="star <= Math.floor(product.rating)"
                    [class.filled]="star <= Math.floor(product.rating)"></app-icon>
        </div>
        <span class="count">({{ product.reviewCount }})</span>
      </div>

      <!-- Name -->
      <h3 class="product-name">{{ product.name }}</h3>

      <!-- Price -->
      <div class="product-price">
        <span class="current-price" [class.on-sale]="product.price.discounted">
          {{ product.price.formattedValue }}
        </span>
        <span class="original-price" *ngIf="product.price.discounted">
          {{ product.price.originalFormattedValue }}
        </span>
      </div>

      <!-- Parcelamento -->
      <div class="product-installment" *ngIf="getInstallment() as inst">
        ou <strong>{{ inst.count }}x de {{ inst.amount }}</strong> sem juros
      </div>

      <!-- Stock -->
      <span *ngIf="getStockStatus() as stock"
            [class]="stock.cssClass"
            [attr.aria-label]="stock.ariaLabel"
            role="status">
        {{ stock.label }}
      </span>
    </div>
  </a>
</article>
