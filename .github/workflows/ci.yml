name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  storefront:
    name: Storefront Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install storefront dependencies
        run: npm ci

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build storefront
        run: npm run build:prod

      - name: Probe strict crypto compatibility
        continue-on-error: true
        run: npm run build:strict-crypto

      - name: Run storefront tests
        run: npm run test:ci
        env:
          CI: 'true'
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: juli-coverage
          path: coverage/juli-workspace/
          retention-days: 7

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: storefront

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build storefront
        run: npm run build:prod

      - name: Run Playwright tests
        run: npm run e2e:standalone
        env:
          CI: 'true'
          # Storefront fixtures — set as repo secrets to ramp coverage on
          # category/product/login flows. Empty values keep test.skip
          # active (build still passes), populated values run them.
          JULI_E2E_CATEGORY_CODE: ${{ secrets.JULI_E2E_CATEGORY_CODE }}
          JULI_E2E_PRODUCT_CODE: ${{ secrets.JULI_E2E_PRODUCT_CODE }}
          JULI_E2E_USERNAME: ${{ secrets.JULI_E2E_USERNAME }}
          JULI_E2E_PASSWORD: ${{ secrets.JULI_E2E_PASSWORD }}
          # B2B journey fixtures — additional secrets for the b2b suite.
          JULI_E2E_B2B_COMPANY: ${{ secrets.JULI_E2E_B2B_COMPANY }}
          JULI_E2E_B2B_APPROVER: ${{ secrets.JULI_E2E_B2B_APPROVER }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  strapi:
    name: Strapi Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: strapi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: strapi/package-lock.json

      - name: Install Strapi dependencies
        run: npm ci

      - name: Run Strapi bootstrap tests
        run: npm test

      - name: Build Strapi admin
        run: npm run build
        env:
          NODE_ENV: production
